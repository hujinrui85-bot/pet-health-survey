<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猫粮指南 - 第一步</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f5f0e8;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }

  .poster {
    width: 750px;
    height: 1334px;
    background: linear-gradient(180deg, #FFF9F0 0%, #FFF5E6 40%, #FFF0DC 100%);
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    border-radius: 24px;
  }

  /* 装饰圆点 */
  .dot-1 {
    position: absolute;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(255,182,108,0.25) 0%, transparent 70%);
    top: 60px; right: -20px;
    border-radius: 50%;
  }
  .dot-2 {
    position: absolute;
    width: 90px; height: 90px;
    background: radial-gradient(circle, rgba(255,168,96,0.2) 0%, transparent 70%);
    top: 340px; left: -30px;
    border-radius: 50%;
  }
  .dot-3 {
    position: absolute;
    width: 150px; height: 150px;
    background: radial-gradient(circle, rgba(255,182,108,0.18) 0%, transparent 70%);
    bottom: 200px; right: -40px;
    border-radius: 50%;
  }

  /* 顶部标签 */
  .top-tag {
    display: inline-block;
    background: #FF6B35;
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    padding: 10px 28px;
    border-radius: 30px;
    letter-spacing: 2px;
    margin: 50px 0 0 50px;
  }

  /* 猫猫头装饰 */
  .cat-deco {
    position: absolute;
    top: 36px;
    right: 50px;
    font-size: 80px;
    opacity: 0.9;
  }

  /* 主标题区 */
  .header {
    padding: 30px 50px 0 50px;
  }

  .step-num {
    font-size: 28px;
    color: #FF6B35;
    font-weight: 800;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .main-title {
    font-size: 52px;
    font-weight: 900;
    color: #2D1B0E;
    line-height: 1.3;
    letter-spacing: 1px;
  }
  .main-title .highlight {
    color: #FF6B35;
    position: relative;
  }
  .main-title .highlight::after {
    content: '';
    position: absolute;
    bottom: 4px;
    left: 0;
    width: 100%;
    height: 12px;
    background: rgba(255,107,53,0.2);
    border-radius: 6px;
  }

  .sub-title {
    font-size: 26px;
    color: #8B6F5C;
    margin-top: 16px;
    font-weight: 500;
    letter-spacing: 1px;
  }

  /* 分割线 */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 30px 50px;
  }
  .divider-line { flex: 1; height: 2px; background: #E8D5C4; border-radius: 1px; }
  .divider-paw { font-size: 24px; color: #D4A574; }

  /* 卡片区 */
  .cards {
    padding: 0 40px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 28px 32px;
    border-radius: 20px;
    background: #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.04);
    transition: transform 0.2s;
    position: relative;
  }

  .card-icon {
    font-size: 56px;
    flex-shrink: 0;
    width: 80px;
    text-align: center;
  }

  .card-content { flex: 1; }
  .card-title {
    font-size: 30px;
    font-weight: 800;
    color: #2D1B0E;
    margin-bottom: 6px;
  }
  .card-arrow {
    font-size: 22px;
    color: #FF6B35;
    font-weight: 700;
    margin: 0 6px;
  }
  .card-desc {
    font-size: 24px;
    color: #FF6B35;
    font-weight: 700;
    display: inline;
  }
  .card-tag {
    font-size: 18px;
    color: #8B6F5C;
    background: #FFF5E6;
    padding: 4px 14px;
    border-radius: 12px;
    margin-left: 10px;
    font-weight: 500;
  }

  /* 底部总结 */
  .bottom-section {
    margin: 36px 50px;
    padding: 36px 40px;
    background: linear-gradient(135deg, #FF6B35 0%, #FF8C5A 100%);
    border-radius: 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .bottom-section::before {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
    top: -60px; right: -60px;
  }

  .bottom-icon { font-size: 48px; display: block; margin-bottom: 10px; }

  .bottom-text {
    font-size: 32px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 2px;
    position: relative;
    z-index: 1;
  }

  .bottom-sub {
    font-size: 22px;
    color: rgba(255,255,255,0.85);
    margin-top: 8px;
    font-weight: 500;
    position: relative;
    z-index: 1;
  }

  /* 底部小猫 */
  .cat-bottom {
    text-align: center;
    font-size: 60px;
    margin-top: 10px;
    opacity: 0.7;
  }

  /* 标签条 */
  .tag-row {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .tag-pill {
    background: #fff;
    border: 2px solid #E8D5C4;
    color: #8B6F5C;
    font-size: 20px;
    padding: 8px 20px;
    border-radius: 20px;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="poster">
  <!-- 装饰 -->
  <div class="dot-1"></div>
  <div class="dot-2"></div>
  <div class="dot-3"></div>
  <div class="cat-deco">🐈</div>

  <!-- 顶部标签 -->
  <div class="top-tag">🐱 新手养猫必看</div>

  <!-- 标题 -->
  <div class="header">
    <div class="step-num">STEP 01</div>
    <div class="main-title">
      先搞清楚<br>
      你家猫属于<span class="highlight">哪种</span>
    </div>
    <div class="sub-title">不同猫，吃的粮完全不一样 👇</div>
  </div>

  <!-- 分割线 -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-paw">🐾</div>
    <div class="divider-line"></div>
  </div>

  <!-- 四种猫类型卡片 -->
  <div class="cards">
    <!-- 幼猫 -->
    <div class="card">
      <div class="card-icon">🍼</div>
      <div class="card-content">
        <div class="card-title">幼猫 <span class="card-tag">0-12个月</span></div>
        <div>
          <span class="card-desc">高能量 + 高蛋白</span>
        </div>
      </div>
    </div>

    <!-- 成猫 -->
    <div class="card">
      <div class="card-icon">😺</div>
      <div class="card-content">
        <div class="card-title">成猫</div>
        <div>
          <span class="card-desc">稳定营养就够了</span>
        </div>
      </div>
    </div>

    <!-- 软便玻璃胃 -->
    <div class="card">
      <div class="card-icon">😿</div>
      <div class="card-content">
        <div class="card-title">软便 / 玻璃胃</div>
        <div>
          <span class="card-desc">关键是"好吸收"</span>
        </div>
      </div>
    </div>

    <!-- 掉毛多 -->
    <div class="card">
      <div class="card-icon">🧶</div>
      <div class="card-content">
        <div class="card-title">掉毛多</div>
        <div>
          <span class="card-desc">高质量动物蛋白 + 脂肪</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部金句 -->
  <div class="bottom-section">
    <span class="bottom-icon">💡</span>
    <div class="bottom-text">第一步不是选粮</div>
    <div class="bottom-sub">是「先判断你家猫属于哪种」</div>
  </div>

  <!-- 标签 -->
  <div class="tag-row">
    <span class="tag-pill">#新手养猫</span>
    <span class="tag-pill">#猫粮推荐</span>
    <span class="tag-pill">#养猫攻略</span>
    <span class="tag-pill">#猫咪喂养</span>
  </div>

  <div class="cat-bottom">🐾</div>
</div>

</body>
</html>
